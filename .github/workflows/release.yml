name: release

# Trigger on a `vX.Y.Z` tag push. To cut a release:
#   bump version in pyproject.toml -> commit -> git tag v0.1.0 && git push --tags
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7.4
        with:
          enable-cache: true

      - name: Build distributions
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/p/csb
    permissions:
      # OIDC trusted publishing — no PyPI API token needed.
      # Configure once at https://pypi.org/manage/account/publishing/.
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
