# CSB Pipeline Configuration
# All paths are POSIX. Override via --config or environment.

global:
  # Fraction of CPUs to use for parallel processing
  cpu_fraction: 0.90
  # Minimum years with cropland (value > 0) to retain a polygon
  min_cropland_years: 2

paths:
  # Root output directory for all pipeline artifacts
  output: /data/csb/output
  # Split CDL rasters by area tile: {split_rasters}/{year}/{area}_{year}_*.tif
  split_rasters: /data/csb/input/split_rasters
  # National CDL rasters: {national_cdl}/{year}/{year}_30m_cdls.tif
  national_cdl: /data/csb/input/national_cdl
  # County/ASD boundary file (GeoParquet or Shapefile)
  boundaries: /data/csb/input/boundaries/US48_ASD_CNTY_Albers.parquet

create:
  # Polygon elimination area thresholds (sq meters, ascending)
  eliminate_thresholds: [100, 1000, 10000]
  # Minimum polygon area to keep (sq meters)
  min_polygon_area: 10000
  # Douglas-Peucker simplification tolerance (meters)
  simplify_tolerance: 60

raster:
  # Cell size in meters
  cell_size: 30
  # Output CRS (EPSG code)
  crs: "EPSG:5070"

